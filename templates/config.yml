# Dream configuration — generated by /dream init. Safe to edit by hand.

# How accepted changes reach you:
#   single      — one giant PR containing all accepted changes
#   per-finding — one PR per finding, no umbrella issue linkage required
#   umbrella    — one umbrella issue + one PR per finding, all linked (default)
merge_style: umbrella

# Research recursion depth. 1 = direct changelog findings only;
# 2 = leads discovered during mining get one round of their own research.
depth_cap: 2

# Default version scope. minor = stay within the current major of every
# dependency and the language toolchain. /dream major overrides per run.
scope: minor

# Ecosystem adapters confirmed at init (files in .claude/dream/adapters/).
# A detected ecosystem NOT listed here runs research-only: no deterministic
# probes, findings capped at medium confidence.
adapters: []
